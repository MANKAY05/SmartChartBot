name: .NET Desktop CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Name: SmartChartBot.sln
      Build_Configuration: Release

    steps:
    # 1. Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup .NET SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'  # Adjust if your project targets a different version

    # 3. Restore NuGet packages
    - name: Restore dependencies
      run: dotnet restore ${{ env.Solution_Name }}

    # 4. Build the solution
    - name: Build solution
      run: dotnet build ${{ env.Solution_Name }} --configuration ${{ env.Build_Configuration }} --no-restore

    # 5. Run tests (only if test projects exist)
    - name: Run tests
      run: dotnet test ${{ env.Solution_Name }} --configuration ${{ env.Build_Configuration }} --no-build --verbosity normal
      continue-on-error: true

    # 6. Publish the desktop application
    - name: Publish application
      run: dotnet publish ${{ env.Solution_Name }} --configuration ${{ env.Build_Configuration }} --output ./publish

    # 7. Upload build artifacts
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SmartChartBot
        path: ./publish
